name: IdleDetector
options:
  bundleIdPrefix: com.nuclearcyborg
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  IdleDetector:
    type: application
    platform: macOS
    sources:
      - path: IdleDetector
    info:
      path: IdleDetector/Info.plist
      properties:
        CFBundleDisplayName: Idle Detector
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Proof of concept — no warranty."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuclearcyborg.IdleDetector
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        COMBINE_HIDPI_IMAGES: YES
